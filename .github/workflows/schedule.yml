name: Daily Stock Bot

on:
  schedule:
    # 避開整點塞車！改在台灣時間 08:55, 09:55, 10:55, 11:55, 12:55 執行
    # (對應 UTC 時間為 00:55, 01:55, 02:55, 03:55, 04:55，週一到週五)
    - cron: '55 0,1,2,3,4 * * 1-5'
  workflow_dispatch: # 允許手動點擊測試

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: 下載程式碼
      uses: actions/checkout@v3
      
    - name: 安裝 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 安裝看盤套件
      run: pip install yfinance pandas requests
        
    - name: 執行股票小秘書
      env:
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: python stock_bot.py


